<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="'Inter', 'Poppins', system-ui, sans-serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4D26B"/>
      <stop offset="50%" stop-color="#C28F2E"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E5238"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#064E3B" opacity="0.08"/>
    </pattern>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#064E3B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#FAFAF7"/>
  <rect width="1080" height="1080" fill="url(#dots)"/>

  <!-- Top emerald bar with arch -->
  <path d="M0 0 H1080 V300 Q540 220 0 300 Z" fill="url(#emerald)"/>

  <!-- Decorative geometric shapes -->
  <circle cx="60" cy="60" r="80" fill="none" stroke="#FFD66B" stroke-width="2" opacity="0.25"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#FFD66B" stroke-width="2" opacity="0.18"/>
  <path d="M1020 80 L1080 80 L1080 140 L1020 140 Z" fill="none" stroke="#FFD66B" stroke-width="2" opacity="0.25" transform="rotate(45 1050 110)"/>

  <!-- LOGO -->
  <g transform="translate(540, 130)">
    <g transform="translate(-75, -50)">
      <path d="M75 0 L140 38 L140 95 L75 133 L10 95 L10 38 Z" fill="none" stroke="url(#gold)" stroke-width="4"/>
    </g>
    <text x="0" y="-12" text-anchor="middle" font-size="20" font-weight="900" fill="url(#gold)" letter-spacing="2">MARKAZ</text>
    <text x="0" y="14" text-anchor="middle" font-size="20" font-weight="900" fill="url(#gold)" letter-spacing="2">TIKRAR</text>
    <text x="0" y="38" text-anchor="middle" font-size="12" font-weight="700" fill="url(#gold)" letter-spacing="4">INDONESIA</text>
  </g>

  <!-- Pendaftaran Dibuka badge -->
  <g transform="translate(540, 280)">
    <rect x="-180" y="-26" width="360" height="52" rx="26" fill="#FFFFFF" stroke="url(#gold)" stroke-width="3" filter="url(#cardShadow)"/>
    <circle cx="-145" cy="0" r="8" fill="#22C55E">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text y="7" text-anchor="middle" font-size="20" font-weight="900" fill="#064E3B" letter-spacing="3">PENDAFTARAN DIBUKA</text>
  </g>

  <!-- HEADLINE -->
  <g transform="translate(540, 410)" text-anchor="middle">
    <text y="0" font-size="84" font-weight="900" fill="#064E3B" letter-spacing="-2">Saatnya Hafal</text>
    <text y="92" font-size="84" font-weight="900" fill="url(#gold)" letter-spacing="-2">Al-Qur'an</text>
    <text y="172" font-size="42" font-weight="700" fill="#064E3B">dengan </text>
    <text y="172" font-size="42" font-weight="900" fill="url(#gold)" dx="100">Bimbingan Halaqah</text>
  </g>

  <!-- Feature row -->
  <g transform="translate(540, 700)">
    <!-- Card 1 -->
    <g transform="translate(-300, 0)" filter="url(#cardShadow)">
      <rect x="-90" y="-70" width="180" height="140" rx="20" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="0" cy="-30" r="22" fill="#ECFDF5" stroke="#22C55E" stroke-width="2"/>
      <text y="-22" text-anchor="middle" font-size="26" font-weight="900" fill="#064E3B">14</text>
      <text y="14" text-anchor="middle" font-size="15" font-weight="800" fill="#064E3B">Pekan Program</text>
      <text y="36" text-anchor="middle" font-size="12" fill="#6B7280">Menuju Syahadah</text>
    </g>
    <!-- Card 2 -->
    <g transform="translate(0, 0)" filter="url(#cardShadow)">
      <rect x="-90" y="-70" width="180" height="140" rx="20" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="0" cy="-30" r="22" fill="#FEF3C7" stroke="url(#gold)" stroke-width="2"/>
      <path d="M-10 -30 L-3 -23 L10 -36" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
      <text y="14" text-anchor="middle" font-size="15" font-weight="800" fill="#064E3B">Terukur</text>
      <text y="36" text-anchor="middle" font-size="12" fill="#6B7280">Real-time Progress</text>
    </g>
    <!-- Card 3 -->
    <g transform="translate(300, 0)" filter="url(#cardShadow)">
      <rect x="-90" y="-70" width="180" height="140" rx="20" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <circle cx="0" cy="-30" r="22" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
      <path d="M-10 -38 V-22 M-2 -38 V-22 M6 -38 V-22 M-12 -22 H10" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
      <text y="14" text-anchor="middle" font-size="15" font-weight="800" fill="#064E3B">Halaqah</text>
      <text y="36" text-anchor="middle" font-size="12" fill="#6B7280">Bimbingan Muallimah</text>
    </g>
  </g>

  <!-- CTA -->
  <g transform="translate(540, 905)">
    <rect x="-200" y="-32" width="400" height="64" rx="32" fill="url(#emerald)" filter="url(#cardShadow)"/>
    <rect x="-195" y="-28" width="390" height="56" rx="28" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <text y="9" text-anchor="middle" font-size="28" font-weight="900" fill="#fff" letter-spacing="0.5">Daftar Sekarang &#8594;</text>
  </g>

  <!-- FOOTER -->
  <g transform="translate(540, 1015)" text-anchor="middle">
    <text y="0" font-size="13" font-weight="700" fill="#9CA3AF" letter-spacing="3">INFORMASI &amp; PENDAFTARAN</text>
    <text y="24" font-size="16" font-weight="800" fill="#064E3B">markaztikrar.id  &#8226;  WA 081330000784  &#8226;  lynk.id/markaztikrar.id</text>
  </g>
</svg>
