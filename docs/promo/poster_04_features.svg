<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="'Inter', 'Poppins', system-ui, sans-serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4D26B"/>
      <stop offset="50%" stop-color="#C28F2E"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E5238"/>
      <stop offset="100%" stop-color="#022C20"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#064E3B" opacity="0.07"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#064E3B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="#FAFAF7"/>
  <rect width="1080" height="1080" fill="url(#dots)"/>

  <!-- Top arch decoration -->
  <path d="M0 0 H1080 V120 Q540 60 0 120 Z" fill="url(#emerald)"/>
  <circle cx="540" cy="40" r="320" fill="none" stroke="#FFD66B" stroke-width="2" opacity="0.18"/>

  <!-- Logo -->
  <g transform="translate(540, 80)">
    <g transform="translate(-55, -38)">
      <path d="M55 0 L100 26 L100 68 L55 94 L10 68 L10 26 Z" fill="none" stroke="url(#gold)" stroke-width="3"/>
    </g>
    <text x="0" y="-12" text-anchor="middle" font-size="14" font-weight="900" fill="url(#gold)" letter-spacing="2">MARKAZ</text>
    <text x="0" y="6" text-anchor="middle" font-size="14" font-weight="900" fill="url(#gold)" letter-spacing="2">TIKRAR</text>
    <text x="0" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="url(#gold)" letter-spacing="3">INDONESIA</text>
  </g>

  <!-- Eyebrow + Headline -->
  <g transform="translate(540, 220)" text-anchor="middle">
    <text y="0" font-size="18" font-weight="700" fill="#C28F2E" letter-spacing="6">FITUR UNGGULAN</text>
    <text y="68" font-size="68" font-weight="900" fill="#064E3B" letter-spacing="-1.5">Tikrar MTI Apps</text>
    <text y="116" font-size="22" font-weight="500" fill="#6B7280">Pendamping setia perjalanan hafalanmu</text>
  </g>

  <!-- 4 Feature Cards in 2x2 grid -->
  <g transform="translate(540, 580)">
    <!-- Card 1: Real-time Progress -->
    <g transform="translate(-200, -130)" filter="url(#shadow)">
      <rect x="-180" y="-110" width="360" height="220" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
      <circle cx="-130" cy="-60" r="28" fill="#ECFDF5"/>
      <!-- Progress icon -->
      <circle cx="-130" cy="-60" r="14" fill="none" stroke="#22C55E" stroke-width="3" stroke-dasharray="60 30" transform="rotate(-90 -130 -60)"/>
      <text x="-130" y="-56" text-anchor="middle" font-size="9" font-weight="900" fill="#22C55E">85%</text>
      <text x="-90" y="-70" font-size="22" font-weight="900" fill="#064E3B">01</text>
      <text x="-90" y="-44" font-size="11" font-weight="700" fill="#22C55E" letter-spacing="2">REAL-TIME</text>
      <text x="-160" y="0" font-size="22" font-weight="900" fill="#064E3B">Monitor Progres</text>
      <text x="-160" y="26" font-size="22" font-weight="900" fill="#064E3B">Hafalan</text>
      <text x="-160" y="60" font-size="13" fill="#6B7280">Pantau hafalanmu kapan</text>
      <text x="-160" y="78" font-size="13" fill="#6B7280">saja, di mana saja.</text>
    </g>

    <!-- Card 2: Jurnal Harian -->
    <g transform="translate(200, -130)" filter="url(#shadow)">
      <rect x="-180" y="-110" width="360" height="220" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
      <circle cx="-130" cy="-60" r="28" fill="#FEF3C7"/>
      <!-- Journal icon -->
      <rect x="-140" y="-72" width="20" height="24" rx="2" fill="#fff" stroke="url(#gold)" stroke-width="2"/>
      <line x1="-136" y1="-66" x2="-124" y2="-66" stroke="url(#gold)" stroke-width="1.2"/>
      <line x1="-136" y1="-60" x2="-124" y2="-60" stroke="url(#gold)" stroke-width="1.2"/>
      <line x1="-136" y1="-54" x2="-128" y2="-54" stroke="url(#gold)" stroke-width="1.2"/>
      <text x="-90" y="-70" font-size="22" font-weight="900" fill="#064E3B">02</text>
      <text x="-90" y="-44" font-size="11" font-weight="700" fill="#C28F2E" letter-spacing="2">DAILY</text>
      <text x="-160" y="0" font-size="22" font-weight="900" fill="#064E3B">Jurnal Harian</text>
      <text x="-160" y="26" font-size="22" font-weight="900" fill="#064E3B">Terintegrasi</text>
      <text x="-160" y="60" font-size="13" fill="#6B7280">Catat ratib tikrar &amp;</text>
      <text x="-160" y="78" font-size="13" fill="#6B7280">murajaah otomatis.</text>
    </g>

    <!-- Card 3: Evaluasi -->
    <g transform="translate(-200, 130)" filter="url(#shadow)">
      <rect x="-180" y="-110" width="360" height="220" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
      <circle cx="-130" cy="-60" r="28" fill="#EFF6FF"/>
      <!-- Chart icon -->
      <rect x="-138" y="-66" width="3" height="12" fill="#3B82F6"/>
      <rect x="-132" y="-72" width="3" height="18" fill="#3B82F6"/>
      <rect x="-126" y="-58" width="3" height="4" fill="#3B82F6"/>
      <rect x="-120" y="-68" width="3" height="14" fill="#3B82F6"/>
      <text x="-90" y="-70" font-size="22" font-weight="900" fill="#064E3B">03</text>
      <text x="-90" y="-44" font-size="11" font-weight="700" fill="#3B82F6" letter-spacing="2">MEASURED</text>
      <text x="-160" y="0" font-size="22" font-weight="900" fill="#064E3B">Evaluasi Berkala</text>
      <text x="-160" y="26" font-size="22" font-weight="900" fill="#064E3B">&amp; Terukur</text>
      <text x="-160" y="60" font-size="13" fill="#6B7280">Tashih rutin oleh</text>
      <text x="-160" y="78" font-size="13" fill="#6B7280">muallimah berpengalaman.</text>
    </g>

    <!-- Card 4: Modern UI -->
    <g transform="translate(200, 130)" filter="url(#shadow)">
      <rect x="-180" y="-110" width="360" height="220" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
      <circle cx="-130" cy="-60" r="28" fill="#F3E8FF"/>
      <!-- Phone icon -->
      <rect x="-138" y="-72" width="16" height="24" rx="3" fill="#fff" stroke="#9333EA" stroke-width="2"/>
      <line x1="-132" y1="-52" x2="-128" y2="-52" stroke="#9333EA" stroke-width="2"/>
      <text x="-90" y="-70" font-size="22" font-weight="900" fill="#064E3B">04</text>
      <text x="-90" y="-44" font-size="11" font-weight="700" fill="#9333EA" letter-spacing="2">MODERN</text>
      <text x="-160" y="0" font-size="22" font-weight="900" fill="#064E3B">Interface yang</text>
      <text x="-160" y="26" font-size="22" font-weight="900" fill="#064E3B">User-Friendly</text>
      <text x="-160" y="60" font-size="13" fill="#6B7280">Desain modern dengan</text>
      <text x="-160" y="78" font-size="13" fill="#6B7280">PWA &amp; offline ready.</text>
    </g>
  </g>

  <!-- CTA -->
  <g transform="translate(540, 920)">
    <rect x="-230" y="-32" width="460" height="64" rx="32" fill="url(#emerald)" filter="url(#shadow)"/>
    <rect x="-225" y="-28" width="450" height="56" rx="28" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <text y="9" text-anchor="middle" font-size="24" font-weight="900" fill="#fff" letter-spacing="0.5">Coba Gratis di markaztikrar.id</text>
  </g>

  <!-- FOOTER -->
  <g transform="translate(540, 1020)" text-anchor="middle">
    <text y="0" font-size="14" font-weight="800" fill="#064E3B">WA 081330000784  &#8226;  lynk.id/markaztikrar.id</text>
  </g>
</svg>
